# =============================================================================
# [pluginConfig] — Arbitrary plugin-specific configuration
# =============================================================================
# This is a free-form JSON object passed to plugins.
# Example:
# [pluginConfig]
# "my-plugin" = { key = "value" }
pluginConfig = null


# =============================================================================
# Global Settings (top-level fields)
# =============================================================================
# Default search source when no source is specified (first is primary).
default_search_source = ["youtube", "soundcloud"]

# Sources to include in unified search results.
unified_search_sources = ["youtube", "soundcloud"]

# Maximum number of search results to return (per source).
max_search_results = 50

# Maximum tracks to load from an album or playlist (global fallback).
max_album_playlist_length = 500

# Interval (ms) for sending player state updates to Lavalink clients.
player_update_interval = 1000

# Interval (ms) for collecting and exposing stats.
stats_update_interval_ms = 15000

# Threshold (ms) before a track is considered "stuck".
track_stuck_threshold_ms = 10000

# Timeout (ms) for dispatching events to clients.
event_timeout_ms = 15000

# Threshold (ms) before a player is considered a zombie and cleaned up.
zombie_threshold_ms = 60000

# Enable Holo Tracks (virtual/holographic track loading).
enable_holo_tracks = true

# Enable the /track/:id streaming endpoint.
enable_track_stream_endpoint = true

# Enable the /load/:id streaming endpoint.
enable_load_stream_endpoint = true

# Resolve external links (e.g. odesli, song.link) to their actual source.
resolve_external_links = true

# Fetch channel info (avatar, banner) for YouTube channels.
fetch_channel_info = true

# Optional encryption key for cached data (AES-256-GCM).
cache_encryption_key = null
