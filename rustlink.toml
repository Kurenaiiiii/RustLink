# =============================================================================
# RustLink Configuration File (rustlink.toml)
# Converted from NodeLink config.js
# =============================================================================
[server]
host = "0.0.0.0"
port = 8211
password = "youdontevenknowmebitch"
max_body_size = 10485760


# =============================================================================
# [logging]
# =============================================================================
[logging]
level = "debug"

[logging.file]
enabled = false
path = "logs"
rotation = "daily"
ttl_days = 7

[logging.debug]
all       = true
request   = true
session   = true
player    = true
filters   = true
sources   = true
lyrics    = true
youtube   = true
"youtube-cipher" = true
sabr      = true
potoken   = true


# =============================================================================
# [connection]
# =============================================================================
[connection]
log_all_checks = false
interval = 2147483647
timeout = 2000

[connection.thresholds]
bad     = 1
average = 5


# =============================================================================
# [metrics]
# =============================================================================
[metrics]
enabled = true
username = "admin"
password = ""
interval = 5000


# =============================================================================
# [rate_limit]
# =============================================================================
[rate_limit]
enabled = false
max_requests = 300
window_ms = 60000
ignore_paths = []

[rate_limit.global]
max_requests = 1000
time_window_ms = 60000

[rate_limit.perIp]
max_requests = 100
time_window_ms = 10000

[rate_limit.perUserId]
max_requests = 50
time_window_ms = 5000

[rate_limit.perGuildId]
max_requests = 20
time_window_ms = 5000

[rate_limit.ignore]
user_ids = []
guild_ids = []
ips = []


# =============================================================================
# [dos_protection]
# =============================================================================
[dos_protection]
enabled = false
max_body_size = 10485760
max_requests_per_second = 50
delay_ms = 0

[dos_protection.thresholds]
burst_requests = 50
time_window_ms = 10000

[dos_protection.mitigation]
delay_ms = 500
block_duration_ms = 300000

[dos_protection.ignore]
user_ids = []
guild_ids = []
ips = []


# =============================================================================
# [audio]
# =============================================================================
[audio]
quality = "high"
encryption = "aead_aes256_gcm_rtpsize"
resampling_quality = "best"
loudness_normalizer = true
lookahead_ms = 200
gate_threshold_lufs = -60.0

[audio.fading]
enabled = false

[audio.fading.track_start]
duration = 0
curve = "linear"
type = "volume"

[audio.fading.track_end]
duration = 0
curve = "linear"
type = "volume"

[audio.fading.track_stop]
duration = 0
curve = "linear"
type = "volume"

[audio.fading.seek]
duration = 0
curve = "linear"
type = "volume"

[audio.fading.pause]
duration = 0
curve = "sinusoidal"
type = "tape"

[audio.fading.resume]
duration = 0
curve = "sinusoidal"
type = "tape"

[audio.fading.ducking]
enabled = false
duration = 0
target_volume = 0.3
curve = "linear"

[audio.crossfade]
enabled = true
duration = 2000
curve = "sinusoidal"
mode = "preload"
min_buffer_ms = 300
buffer_ms = 500


# =============================================================================
# [filters]
# =============================================================================
[filters]

[filters.enabled]
tremolo      = true
vibrato      = true
lowpass      = true
highpass     = true
rotation     = true
karaoke      = true
distortion   = true
channel_mix  = true
equalizer    = true
chorus       = true
compressor   = true
echo         = true
phaser       = true
timescale    = true


# =============================================================================
# [sponsorblock]
# =============================================================================
[sponsorblock]
enabled = true
api = "https://sponsor.ajay.app"
categories = [
    "sponsor", "selfpromo", "interaction", "intro",
    "outro", "preview", "music_offtopic", "filler",
]
action_types = ["skip"]
skip_margin_ms = 150


# =============================================================================
# [lyrics]
# =============================================================================
[lyrics]
fallback_source = "genius"

[lyrics.youtube]
enabled = true
[lyrics.genius]
enabled = true
[lyrics.musixmatch]
enabled = true
