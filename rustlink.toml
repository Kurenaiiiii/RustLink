# =============================================================================
# [meanings]
# =============================================================================
[meanings.letrasmus]
enabled = true
[meanings.wikipedia]
enabled = true


# =============================================================================
# [plugins]
# =============================================================================
[plugins]
enabled = false
paths = []
definitions = []


# =============================================================================
# [voiceReceive]
# =============================================================================
[voiceReceive]
enabled = true
format = "pcm_s16le"


# =============================================================================
# [routePlanner]
# =============================================================================
[routePlanner]
strategy = "RotateOnBan"
bannedIpCooldown = 600000
ipBlocks = []


# =============================================================================
# [mix]
# =============================================================================
[mix]
enabled = true
defaultVolume = 0.8
maxLayersMix = 15
autoCleanup = true


# =============================================================================
# [cluster]
# =============================================================================
[cluster]
enabled = false
workers = 0
min_workers = 2
command_timeout = 15000
fast_command_timeout = 4000
max_retries = 3
process_mode = "in-process"

[cluster.specialized_source_worker]
enabled = true
count = 2
micro_workers = 4
tasks_per_worker = 100
silent_logs = true

[cluster.hibernation]
enabled = true
timeoutMs = 1200000

[cluster.scaling]
maxPlayersPerWorker = 50
targetUtilization = 0.7
scaleUpThreshold = 0.75
scaleDownThreshold = 0.3
checkIntervalMs = 5000
idleWorkerTimeoutMs = 60000
queueLengthScaleUpFactor = 5
lagPenaltyLimit = 60
cpuPenaltyLimit = 0.85

[cluster.endpoint]
patch_enabled = true
allow_external_patch = false
code = "CAPYBARA"


