# =============================================================================
# RustLink Configuration File (rustlink.toml)
# =============================================================================
# This is the main configuration file for RustLink (a Lavalink-compatible audio
# server). Every field has a sensible default — you only need to set what you
# want to override.
#
# Format: TOML (https://toml.io/en/v1.0.0)
# Nested sections use dots, e.g. [server], [sources.youtube], [audio.fading]
#
# You can also override any setting via environment variables:
#   RUSTLINK__SERVER__PORT=2334
#   NODELINK__SOURCES__SPOTIFY__CLIENT_ID=xxx
# =============================================================================


# =============================================================================
# [server] — HTTP/WS server settings
# =============================================================================
[server]
# Host address to bind to. "0.0.0.0" = all interfaces.
host = "0.0.0.0"
# Port for Lavalink clients to connect to (default: 2333).
port = 2333
# Password required by clients on connect (Lavalink protocol).
password = "youshallnotpass"
# Maximum allowed HTTP request body size in bytes (default: 10 MB).
max_body_size = 10485760


# =============================================================================
# [logging] — Logging behaviour
# =============================================================================
[logging]
# Minimum log level: trace | debug | info | warn | error
level = "info"

[logging.file]
# Whether to write logs to a file (in addition to stdout).
enabled = false
# Directory for log files.
path = "logs"
# Rotation strategy: "daily" | "hourly" | "never"
rotation = "daily"
# Delete log files older than this many days.
ttl_days = 7

[logging.debug]
# Set any of these to true to enable verbose debug logging for specific subsystems.
all       = false   # Enable ALL debug logging (overrides individual flags)
request   = false   # Log all HTTP request/response details
session   = false   # Log session lifecycle events
player    = false   # Log player state transitions
filters   = false   # Log filter application
sources   = false   # Log source resolution attempts
lyrics    = false   # Log lyric fetching
youtube   = false   # Log YouTube-specific debug info
"youtube-cipher" = false  # Log YouTube cipher signature solving
sabr      = false   # Log SABR (Stream Audio Binary Response) protocol
potoken   = false   # Log PO token generation


# =============================================================================
# [connection] — Voice connection health checks
# =============================================================================
[connection]
# Log every health check (can be noisy).
log_all_checks = false
# Interval (ms) between connection quality checks.
# Default is u32::MAX (~24 days), effectively disabling periodic checks.
interval = 2147483647
# Timeout (ms) for each quality check request.
timeout = 2000

[connection.thresholds]
# Connection quality thresholds (ms). Used to classify voice server latency.
bad     = 1    # Penalty threshold for "bad" connections
average = 5    # Penalty threshold for "average" connections


# =============================================================================
# [metrics] — Prometheus metrics endpoint
# =============================================================================
[metrics]
# Enable the /metrics endpoint for Prometheus scraping.
enabled = false
# Basic-auth username for the /metrics endpoint.
username = "admin"
# If not set, falls back to the main server password.
password = null
# Metrics collection interval in ms.
interval = 5000


# =============================================================================
# [rate_limit] — HTTP rate limiting
# =============================================================================
[rate_limit]
# Master switch for rate limiting.
enabled = true
# (Legacy) flat rate limit: max requests per window.
max_requests = 300
# (Legacy) rate limit window in ms.
window_ms = 60000
# Paths to exclude from ALL rate limiting (e.g. ["/metrics", "/health"]).
ignore_paths = []

[rate_limit.global]
# Global rate limit across all clients.
max_requests = 1000
time_window_ms = 60000

[rate_limit.perIp]
# Per-IP address rate limit.
max_requests = 100
time_window_ms = 10000

[rate_limit.perUserId]
# Per-Lavalink-user-id rate limit.
max_requests = 50
time_window_ms = 5000

[rate_limit.perGuildId]
# Per-discord-guild rate limit.
max_requests = 20
time_window_ms = 5000

[rate_limit.ignore]
# Entities to completely exclude from rate limiting.
user_ids = []
guild_ids = []
ips = []


# =============================================================================
# [dos_protection] — Basic DoS / abuse protection
# =============================================================================
[dos_protection]
# Master switch for DoS protection.
enabled = true
# Maximum request body size in bytes.
max_body_size = 10485760
# Maximum requests per second before mitigation kicks in.
max_requests_per_second = 50
# Delay (ms) to add to responses when throttling (legacy).
delay_ms = 0

[dos_protection.thresholds]
# Burst detection: how many requests in the time window triggers mitigation.
burst_requests = 50
time_window_ms = 10000

[dos_protection.mitigation]
# What happens when thresholds are exceeded.
delay_ms = 500              # Extra delay added to each request
block_duration_ms = 300000  # How long to block the offender (5 min)

[dos_protection.ignore]
# Entities exempt from DoS protection.
user_ids = []
guild_ids = []
ips = []


# =============================================================================
# [audio] — Audio playback settings
# =============================================================================
[audio]
# Opus encoding quality: "low" | "medium" | "high" | "best"
quality = "high"
# Encryption mode: "aead_aes256_gcm_rtpsize" (standard Lavalink)
encryption = "aead_aes256_gcm_rtpsize"
# Resampling quality: "fast" | "medium" | "best"
resampling_quality = "best"
# Enable loudness normalization (EBU R128 / loudnorm filter).
loudness_normalizer = true
# Lookahead (ms) for loudness normalization.
lookahead_ms = 200
# Gate threshold (LUFS) — silence below this level is ignored.
gate_threshold_lufs = -60.0

# === Audio Fading (gradual volume transitions) ===
[audio.fading]
# Master switch for all fading effects.
enabled = false

[audio.fading.track_start]
# Fade in when a track starts.
duration = 0    # ms (0 = instant)
curve = "linear"  # "linear" | "sinusoidal" | "logarithmic" | "cubic"
type = "volume"   # "volume" | "crossfade"

[audio.fading.track_end]
# Fade out when a track ends naturally.
duration = 0
curve = "linear"
type = "volume"

[audio.fading.track_stop]
# Fade out when a track is manually stopped.
duration = 0
curve = "linear"
type = "volume"

[audio.fading.seek]
# Fade on seek.
duration = 0
curve = "linear"
type = "volume"

[audio.fading.pause]
# Fade on pause.
duration = 0
curve = "sinusoidal"
type = "tape"

[audio.fading.resume]
# Fade on resume.
duration = 0
curve = "sinusoidal"
type = "tape"

[audio.fading.ducking]
# Automatically duck (reduce) volume during voice activity.
enabled = false
duration = 0         # ms to fade duck in/out
target_volume = 0.3  # 0.0 (mute) to 1.0 (full)
curve = "linear"

# === Audio Crossfade ===
[audio.crossfade]
# Smooth transition between tracks.
enabled = true
duration = 2000      # ms
curve = "sinusoidal"
mode = "preload"     # "preload" | "normal"
min_buffer_ms = 300  # Minimum buffer before crossfade starts
buffer_ms = 500      # Buffer window for crossfade


# =============================================================================
# [filters] — Which audio filters are available
# =============================================================================
[filters]
# Each entry toggles whether the filter can be used by clients.
# All default to true (enabled).

[filters.enabled]
tremolo      = true
vibrato      = true
lowpass      = true
highpass     = true
rotation     = true
karaoke      = true
distortion   = true
channel_mix  = true
equalizer    = true
chorus       = true
compressor   = true
echo         = true
phaser       = true
timescale    = true


# =============================================================================
# [sponsorblock] — SponsorBlock integration (skip segments in YouTube tracks)
# =============================================================================
[sponsorblock]
# Enable SponsorBlock segment skipping.
enabled = true
# SponsorBlock API endpoint.
api = "https://sponsor.ajay.app"
# Categories of segments to skip.
categories = [
    "sponsor", "selfpromo", "interaction", "intro",
    "outro", "preview", "music_offtopic", "filler",
]
# Action types to apply ("skip" | "mute" | "full" | "poi").
action_types = ["skip"]
# Margin (ms) before and after segments to add to the skip.
skip_margin_ms = 150


# =============================================================================
# [lyrics] — Lyrics providers
# =============================================================================
[lyrics]
# Fallback source used when the primary source has no lyrics.
fallback_source = "genius"

# Per-source toggle. Each is: enabled = true/false
[lyrics.youtube]
enabled = true
[lyrics.genius]
enabled = true
[lyrics.musixmatch]
enabled = true
[lyrics.deezer]
enabled = true
[lyrics.lrclib]
enabled = true
[lyrics.letrasmus]
enabled = true
[lyrics.bilibili]
enabled = true
[lyrics.yandexmusic]
enabled = true
[lyrics.monochrome]
enabled = true


# =============================================================================
# [meanings] — Song meaning / explanation sources
# =============================================================================
[meanings.letrasmus]
enabled = true
[meanings.wikipedia]
enabled = true


# =============================================================================
# [plugins] — Plugin system
# =============================================================================
[plugins]
# Enable plugin loading.
enabled = false
# Directories to scan for plugin files.
paths = []

# Each entry in definitions describes a plugin to load.
#   [[plugins.definitions]]
#   name = "my-plugin"
#   source = "https://example.com/plugin.zip"
#   path = "./plugins/my-plugin"
#   package = "my-plugin"
#   [plugins.definitions.config]
#   option = "value"
definitions = []


# =============================================================================
# [voiceReceive] — Voice receive (forwarding audio from Discord to your app)
# =============================================================================
[voiceReceive]
# Enable receiving raw audio from voice channels.
enabled = false
# Output format: "opus" (native) or "pcm_s16le" (decoded WAV).
format = "opus"


# =============================================================================
# [routePlanner] — IP rotation strategy for rate-limited sources
# =============================================================================
[routePlanner]
# Strategy: "RotateOnBan" | "LoadBalance" | "NanoIp" | "RotatingNanoIp"
strategy = "RotateOnBan"
# Cooldown (ms) before a banned IP can be retried.
bannedIpCooldown = 600000
# Static list of IP blocks (CIDR notation) for the planner.
ipBlocks = []


# =============================================================================
# [mix] — Multi-source audio mixing
# =============================================================================
[mix]
# Enable mixing multiple audio sources into one stream.
enabled = true
# Default volume for mixed layers (0.0 to 1.0).
defaultVolume = 0.8
# Maximum number of concurrent mix layers.
maxLayersMix = 5
# Automatically clean up finished mix layers.
autoCleanup = true


# =============================================================================
# [cluster] — Multi-worker / multi-node clustering
# =============================================================================
[cluster]
# Enable clustering (multi-process or multi-node).
enabled = false
# Number of worker processes (0 = auto-detect CPU count).
workers = 0
# Minimum number of workers to keep alive.
min_workers = 1
# Command timeout (ms) for normal operations.
command_timeout = 15000
# Command timeout (ms) for fast operations (e.g. search).
fast_command_timeout = 4000
# Max retries for failed worker commands.
max_retries = 3
# Worker mode: "in-process" | "multi-process"
process_mode = "in-process"

# === Specialized Source Workers ===
[cluster.specialized_source_worker]
# Route heavy source tasks (e.g. YouTube) to dedicated workers.
enabled = false
count = 1
micro_workers = 2
tasks_per_worker = 100
silent_logs = true

# === Hibernation ===
[cluster.hibernation]
# Hibernate idle workers after timeout to save resources.
enabled = true
timeoutMs = 1200000  # 20 min

# === Auto-scaling ===
[cluster.scaling]
# Dynamically adjust worker count based on load.
maxPlayersPerWorker = 20
targetUtilization = 0.7
scaleUpThreshold = 0.75
scaleDownThreshold = 0.3
checkIntervalMs = 5000
idleWorkerTimeoutMs = 60000
queueLengthScaleUpFactor = 5
lagPenaltyLimit = 60
cpuPenaltyLimit = 0.85

# === Redis (multi-node clustering) ===
[cluster]
# Redis connection URL (required for multi-node clustering).
redis_url = null
# Unique node identifier for this instance.
node_id = null
# Heartbeat interval in seconds (for cluster health).
heartbeat_interval_secs = 10
# Timeout in seconds before a node is considered dead.
node_timeout_secs = 30

# === Cluster Endpoint Override ===
[cluster.endpoint]
# Code for the custom endpoint handler.
code = ""
# Allow patching the endpoint dynamically.
patch_enabled = false
# Allow external sources to patch the endpoint.
allow_external_patch = false


# =============================================================================
# [sources] — Music source providers
# =============================================================================
# Each source has `enabled = true/false`. Sources with extra config options
# are documented below. Simple on/off sources are listed at the bottom.

# --- HTTP (raw URL streams) ---
[sources.http]
enabled = true

# --- Local filesystem ---
[sources.local]
enabled = true
base_path = "./local-music"

# --- Google TTS ---
[sources.google-tts]
enabled = true
language = "en-US"

# --- YouTube ---
[sources.youtube]
enabled = true
# Allowed itag codes (audio formats). 251 = opus 160k, 140 = m4a 128k.
allow_itag = [251, 140]
# Force a specific itag (null = let the server decide).
target_itag = null
# Attempt OAuth-based token refresh for restricted videos.
get_oauth_token = false
# OAuth refresh tokens (list of base64-encoded tokens).
refresh_tokens = []
# PO token for bot mitigation (generated via po-token-generator).
potoken = null
# PO token generation endpoint.
po_token_endpoint = null
# YouTube UI language (affects search results).
hl = "en"
# YouTube content region.
gl = "US"
# Sources to try when YouTube fails.
fallback_sources = [
    "soundcloud", "deezer", "jiosaavn", "qobuz",
    "bandcamp", "audius", "mixcloud",
]
# HTTP proxies for YouTube requests (rotated on failure).
proxies = []

[sources.youtube.clients]
# Which YouTube client to use for each operation type.
search    = ["Android"]
playback  = ["AndroidVR", "TV", "TVCast", "WebEmbedded", "WebParentTools", "Web", "IOS"]
resolve   = ["AndroidVR", "TV", "TVCast", "WebEmbedded", "WebParentTools", "IOS", "Web"]
# Per-client custom settings (e.g. OAuth tokens for TV client).
settings = null

[sources.youtube.cipher]
# Cipher server URL for signature solving (YouTube n parameter).
url = "https://cipher.kikkia.dev/api"
# Optional bearer token for the cipher server.
token = null

